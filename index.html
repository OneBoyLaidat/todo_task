<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <article class="todo-card" data-testid="test-todo-card" id="todo-card">
        <div
          class="priority-indicator"
          data-testid="test-todo-priority-indicator"
          id="priority-indicator"
        ></div>

        <div id="view-mode">
          <header class="todo-header">
            <div class="title-container">
              <h2
                class="todo-title"
                data-testid="test-todo-title"
                id="display-title"
              >
                Complete Q1 Performance Reviews
              </h2>
              <div class="badges-row">
                <span
                  class="badge priority-high"
                  data-testid="test-todo-priority"
                  id="display-priority"
                  >High</span
                >
                <span
                  class="badge status-pending"
                  data-testid="test-todo-status"
                  id="display-status-badge"
                  >Pending</span
                >
                <span
                  class="badge overdue-badge hidden"
                  data-testid="test-todo-overdue-indicator"
                  id="overdue-indicator"
                  >Overdue</span
                >
              </div>
            </div>

            <div class="status-control-container">
              <label for="status-control" class="sr-only">Change Status</label>
              <select
                id="status-control"
                class="status-select"
                data-testid="test-todo-status-control"
              >
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
              </select>
            </div>
          </header>

          <div class="todo-body">
            <div
              class="collapsible-container collapsed"
              data-testid="test-todo-collapsible-section"
              id="todo-collapse"
            >
              <p
                class="todo-description"
                data-testid="test-todo-description"
                id="display-desc"
              >
                Gather feedback from team leads and prepare the final
                performance reports for all junior developers. Ensure all
                metrics are aligned with company KPIs.
              </p>
            </div>
            <button
              class="expand-btn"
              data-testid="test-todo-expand-toggle"
              id="expand-toggle"
              aria-expanded="false"
              aria-controls="todo-collapse"
            >
              Read More
            </button>

            <div class="todo-tags" data-testid="test-todo-tags" role="list">
              <span class="tag" data-testid="test-todo-tag-work">Work</span>
              <span class="tag" data-testid="test-todo-tag-urgent">Urgent</span>
              <span class="tag">HR</span>
            </div>
          </div>

          <footer class="todo-footer">
            <div class="date-container">
              <time
                class="due-date"
                data-testid="test-todo-due-date"
                id="due-date-display"
              ></time>
              <time
                class="time-remaining"
                data-testid="test-todo-time-remaining"
                id="time-remaining"
                aria-live="polite"
              ></time>
            </div>

            <div class="actions">
              <label class="toggle-container">
                <input
                  type="checkbox"
                  data-testid="test-todo-complete-toggle"
                  id="complete-toggle"
                />
                <span class="label-text">Done</span>
              </label>

              <div class="button-group">
                <button
                  class="icon-btn"
                  data-testid="test-todo-edit-button"
                  id="btn-edit"
                  aria-label="Edit Task"
                  title="Edit"
                >
                  ✎
                </button>
                <button
                  class="icon-btn btn-delete"
                  data-testid="test-todo-delete-button"
                  aria-label="Delete Task"
                  title="Delete"
                >
                  🗑
                </button>
              </div>
            </div>
          </footer>
        </div>

        <form
          id="edit-mode"
          class="edit-form hidden"
          data-testid="test-todo-edit-form"
        >
          <div class="form-group">
            <label for="edit-title">Title</label>
            <input
              type="text"
              id="edit-title"
              data-testid="test-todo-edit-title-input"
              required
            />
          </div>

          <div class="form-group">
            <label for="edit-desc">Description</label>
            <textarea
              id="edit-desc"
              rows="3"
              data-testid="test-todo-edit-description-input"
              required
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label for="edit-priority">Priority</label>
              <select
                id="edit-priority"
                data-testid="test-todo-edit-priority-select"
              >
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </div>
            <div class="form-group half">
              <label for="edit-date">Due Date & Time</label>
              <input
                type="datetime-local"
                id="edit-date"
                data-testid="test-todo-edit-due-date-input"
                required
              />
            </div>
          </div>

          <div class="edit-actions">
            <button
              type="button"
              class="btn-cancel"
              data-testid="test-todo-cancel-button"
              id="btn-cancel"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="btn-save"
              data-testid="test-todo-save-button"
              id="btn-save"
            >
              Save
            </button>
          </div>
        </form>
      </article>
    </main>
    <script src="script.js"></script>
  </body>
</html>
