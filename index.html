<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <article class="todo-card" data-testid="test-todo-card" id="todo-card">
            
            <header class="todo-header">
                <div class="title-container">
                    <h2 class="todo-title" data-testid="test-todo-title">Complete Q1 Performance Reviews</h2>
                    <span class="badge priority-high" data-testid="test-todo-priority" aria-label="High Priority">High</span>
                    <span class="badge status-pending" data-testid="test-todo-status" id="status-text">Pending</span>
                </div>
            </header>

            <div class="todo-body">
                <p class="todo-description" data-testid="test-todo-description">
                    Gather feedback from team leads and prepare the final performance reports for all junior developers.
                </p>

                <div class="todo-tags" data-testid="test-todo-tags" role="list">
                    <span class="tag" data-testid="test-todo-tag-work">Work</span>
                    <span class="tag" data-testid="test-todo-tag-urgent">Urgent</span>
                    <span class="tag">HR</span>
                </div>
            </div>

            <footer class="todo-footer">
                <div class="date-container">
                    <time class="due-date" data-testid="test-todo-due-date" id="due-date-display"></time>
                    <time class="time-remaining" data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite"></time>
                </div>

                <div class="actions">
                    <label class="toggle-container">
                        <input type="checkbox" data-testid="test-todo-complete-toggle" id="complete-toggle">
                        <span class="label-text">Done</span>
                    </label>

                    <div class="button-group">
                        <button class="icon-btn" data-testid="test-todo-edit-button" aria-label="Edit Task" title="Edit">
                            ✎
                        </button>
                        <button class="icon-btn btn-delete" data-testid="test-todo-delete-button" aria-label="Delete Task" title="Delete">
                            🗑
                        </button>
                    </div>
                </div>
            </footer>

        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
